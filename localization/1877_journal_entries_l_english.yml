 # Liquidating the Public Trust
 je_public_liquidation: "Liquidating the Public Trust"
 je_public_liquidation_reason: "The transition to a Directorate has left the state's balance sheets in unacceptable condition. The previous administration saddled us with exorbitant, non-profit public services that drain our dividends and provide zero return on investment. The Board demands immediate austerity. We must divest from the public sector and open these captive markets to private enterprise, or the weight of these unfunded liabilities will bankrupt the state."
