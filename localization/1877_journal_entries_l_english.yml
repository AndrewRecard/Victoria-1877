 minarchism_button: "Fund Minarchist Lobbies"
 minarchism_button_desc: "The Directorate must remain a night-watchman over the market, ensuring that the gears of industry are greased by competition, but never ground to a halt by radical chaos."
 molinarism_button: "Fund Molinarist Lobbies"
 molinarism_button_desc: "If the Directorate truly believes in the supremacy of the market, why should the provision of law itself be exempt from the rigors of competition?"
