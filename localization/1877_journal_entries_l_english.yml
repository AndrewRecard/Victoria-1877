 # Defense Incorporation
 je_group_propertarianism: "Propertarianism"
 je_defense_incorporation: "Defense, Incorporated"
 je_defense_incorporation_reason: "The sudden privatization of the military has provoked a mass exodus of traditionalist officers and loyal foot-soldiers. As it stands, our military readiness is crippled; therefore we must weather the social and economic restructuring process by allowing enough time for the defense agencies' incorporation process as well as the government's adaptation to this new system.\n\nWhen all is said and done, the outcome should be the most profitable and efficient military-industrial sector the world has ever seen."
 ir_defense_agencies_reform_modifier: "Military Reconstruction"
 ir_defense_agencies_drain_modifier: "Patriotic Exodus"
 ir_defense_agencies_investment_modifier: "Corporate Arms Race"
 repeal_defense_agencies_button: "Revoke Contracts"
 repeal_defense_agencies_button_desc: "The privatization of our armed forces has been a disastrous miscalculation. Immediately void the contracts and forcibly restore the traditional military apparatus."
 depose_armed_forces_leader_button: "Appoint Security Executive"
 depose_armed_forces_leader_button_desc: "Force the early retirement of the military's bureaucratic old guard and install a [GetIdeology('ideology_market_liberal').GetName] or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],propertarian_ideologies_list_tt Propertarian#! politician who agrees with the new defense paradigm."
 market_liberal_armed_forces_leader_tt: "The [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] are led by a [GetIdeology('ideology_market_liberal').GetName] or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],propertarian_ideologies_list_tt Propertarian#! [concept_leader]"
