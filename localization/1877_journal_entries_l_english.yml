 # Boardroom Schism
 je_boardroom_schism: "Boardroom Schism"
 je_boardroom_schism_reason: "With the state apparatus now privatized, the Propertarian movement has fractured. The Directorate must have a cohesive ideology if it is to provide market stability and shareholder certainty, lest our dividends be put to removing human capital from the nation's GDP figures."
 je_boardroom_lobbying_cost: "\n\nBoardroom Lobbying is costing us #r @money!-[GetPlayer.MakeScope.ScriptValue('lobbying_expenditure_value')|D]#! per week."

 je_schism_resulting_je: "The most influential out of the [GetIdeology('ideology_monopolist_leader').GetName] or [GetIdeology('ideology_molinarist_leader').GetName] lobbies will receive a mandate to implement their ideology. The [GetIdeology('ideology_minarchist_leader').GetName] lobby will be exempt, as they wish to maintain status-quo."
 je_schism_complete: "One of the three #tooltippable;tooltip:[GetPlayer.GetTooltipTag],propertarian_ideologies_list_tt Propertarian#! lobbies have won over the Board and suited the Directorate to their ideals."
 je_schism_no_mandate: "Either of the [GetIdeology('ideology_monopolist_leader').GetName] or [GetIdeology('ideology_molinarist_leader').GetName] lobbies fail to implement their mandate."
