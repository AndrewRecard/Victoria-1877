 # Industry and Integrity
 je_industry_and_integrity: "Industry and Integrity"
 je_industry_and_integrity_reason: "Whether constrained by the inefficient monopolies of the state or threatened by the striking mobs in our streets, the engines of [ROOT.GetCountry.GetAdjective] prosperity are in peril. We must look to the market for our salvation. We must propagate a new vanguard of political and industrial thought, for only the absolute freedom of enterprise can secure our future.\n\nWhilst this [concept_journal_entry] is active, the rate at which #tooltippable;tooltip:[GetPlayer.GetTooltipTag],propertarian_ideologies_list_tt Propertarian#! characters appear will be increased."
