l_english:
 # AMENDMENT EVENTS
 amendment_events.1.t: "Entrenched Benefits"
 amendment_events.1.d: "The state’s welfare program has transitioned from a temporary measure to a permanent guarantee that defines the modern relationship between citizen and state. These benefits have become a fixed expectation of daily life, rendering legislative rollback a form of political suicide."
 amendment_events.1.f: ""A heavy blow. Did the master sign your slip, at least?"\n"Aye. They kept me in the queue for two hours, but the clerk finally stamped my book. It'll draw a few shillings come Friday — just enough to keep the landlord quiet until I can find another furnace to tend."\nThomas gave a slow, approving nod. "Better than the poorhouse, like in our fathers' days. Just mind you don't grow too comfortable living on the Ministry's coin." He tapped the ash from his pipe onto the pavement. "Myself, I’ve only two more winters at the loom. Soon as I strike sixty-five, I’m washing the machine-grease from my hands for good.""
 amendment_events.1.a: "The benefits outweigh the costs."
 amendment_events.1.b: "Do the elderly not also have a right to eat?"
 amendment_events.1.c: "This is getting out of hand."
 ir_repeal_welfare_modifier: "Curbing Public Dependency"
 ir_bolstered_trade_unions_modifier: "Signature Legislation"
 ir_fickle_welfare_state_modifier: "Fickle Welfare State"

 amendment_events.2.t: "The New Normal"
 amendment_events.2.d: "The window for rolling back the welfare state has closed. The public now views this support as an unshakable right, and any remaining political will to dismantle the system has evaporated."
 amendment_events.2.f: "Once a policy, now a pillar. The people have forgotten there was ever any other way."
 amendment_events.2.a: "It is settled."

 # DIRECTORATE EVENTS
 directorate_events.1.t: "Articles of Incorporation"
 directorate_events.1.d: "The ink is dry on the new Corporate Charter, which has formally replaced the old constitution. Of immediate concern to the interim Board of Directors is how to structure the national hierarchy."
 directorate_events.1.f: ""...naturally, the Class-A shares held by the Board will carry ten thousand times the voting weight."\n\nSterling frowned. "A wasteful endeavor. Why coddle them with illusions? We bought this country fair and square. The Board should dictate policy directly."\n\n"Because, my dear Sterling," Arthur smiled, "a man who believes he is voting for his manager is far less likely to riot than a man who knows he is a subject. Let them have their democracy. The house always wins.""
 directorate_events.1.a: "Allow them to buy their franchise."
 directorate_events.1.b: "The Board answers to no one but the market."
 directorate_events.1.c: "Our technocratic foundation has evolved."
 directorate_events.1.e: "Grant [SCOPE.sCharacter('incorporation_ruler').GetFullName] executive powers over the Board."

 directorate_events.2.t: "Human Capital"
 directorate_events.2.d: "With the Directorate now formally established, the Board must address the persistent nuisance of organized labor. The [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] are threatening strikes, demanding to know how collective bargaining will function under the new regime. The interim Board is sharply divided on how to manage our most volatile asset: human capital."
 directorate_events.2.f: ""A union is nothing but a monopoly on labor," Sterling argued. "It is an illegal cartel designed to extort the shareholders. We must outlaw them entirely. Let every man negotiate his own wage, or let him starve."\n\nArthur adjusted his cuffs, entirely unbothered. "If you crush them, they will simply organize in the dark, and dynamite will be bought factory floor. No, we don't ban the unions. We mandate internal arbitration. We give them a grievance box, and we keep the key.""
 directorate_events.2.a: "Dissolve the cartels, let us consider labor an individual contract."
 directorate_events.2.b: "Unions work best when they work for us. Incorporate them."

 directorate_events.3.t: "Creditor Ultimatum"
 directorate_events.3.d: "The Directorate's books have crossed a line the bondholders will no longer ignore. A delegation of underwriters — led by men with significant stakes in the [SCOPE.sCompany('creditor_company').GetExecutive.GetInterestGroup.GetName] — has arrived to "renegotiate the terms of our facility." The implication is unsubtle: produce collateral, restructure, or watch our credit rating collapse alongside our remaining institutions."
 directorate_events.3.f: ""Gentlemen, we are not here to discuss whether the loan will be serviced. We are here to discuss how."— [SCOPE.sCompany('creditor_company').GetExecutive.GetFullName], [SCOPE.sCompany('creditor_company').GetName]"
 directorate_events.3.a: "Refinance on their terms."
 directorate_events.3.b: "Repudiate on the obligation."
 directorate_events.3.c: "Open the public ledgers to auction."
 ir_refinanced_loan_modifier: "Refinanced Loan"
 ir_dishonored_loan_modifier: "Dishonored Loan"
 ir_auctioning_assets_modifier: "Auctioning State Assets"

 directorate_events.4.t: "Municipal Default"
 directorate_events.4.d: "Word reaches the Directorate that the government of [SCOPE.sState('defaulting_state').GetName] has missed payroll for the third consecutive month. With central subsidies stripped away by our austerity program, the local administration has no remaining revenue to service its outstanding obligations. Creditors are circling and the Board demands a decision."
 directorate_events.4.f: ""Gentlemen, the constituents of [SCOPE.sState('defaulting_state').GetName] do not require services. They require discipline. The market will provide both, in due course.\"\n- Memo from the Office of the Comptroller"
 directorate_events.4.a: "Underwrite their debts."
 directorate_events.4.b: "Let the ledger settle itself."
 directorate_events.4.c: "Sell the municipality to the highest bidder."

 directorate_events.5.t: "Notice of Termination"
 directorate_events.5.d: "By dawn the queue of dismissed clerks already stretched past the customs house in [SCOPE.sState('layoff_state').GetName] — men in clean collars, ledger-books still tucked under their arms, waiting to be told whether their pensions had survived the night. Notices were nailed to the ministry doors before the lamps were lit. The Board's auditors have ordered a wholesale reduction of the civil service, and the question that now reaches the Directorate is not whether, but how."
 directorate_events.5.f: ""I have served the Treasury for twenty-two years. This morning a man I had never seen before handed me a printed slip and asked me to clear my desk before luncheon. The slip says my position has been 'rationalized.' I have a wife. I have three children at school. I do not know what that word is supposed to mean to me."\n— Letter to the editor, [SCOPE.sState('layoff_state').GetName] Penny Press"
 directorate_events.5.a: "Process the dismissals without delay."
 directorate_events.5.b: "Honor the severance contracts in full."
 ir_mass_layoffs_modifier: "Mass Layoffs"
 ir_severance_program_modifier: "Severance Program"

 directorate_events.8.t: "Public Trust, Liquidated"
 directorate_events.8.d: "The insolvency proceedings are closed. With our balance sheet a monument to fiscal mismanagement, the Board of Directors has voted to authorize the immediate dissolution of every remaining public liability. Schools, hospitals, welfare programs, police forces — every instrument of the old public order is to be sold, disbanded, or simply abandoned.\n\nThe civil service will be maintained at minimum operational capacity, if only to sign the dissolution papers."
 directorate_events.8.f: "Every institution has a price. We have simply run out of buyers."
 directorate_events.8.a: "There is only the Boardroom now."

 # PROPERTARIAN AGITATION EVENTS
 propertarian_origins.1.t: "The Production of Security"
 propertarian_origins.1.d: "The increasing bureaucratic overreach of the state apparatus has become a significant burden on the engines of industry. An essay titled "The Production of Security," written by a radical economist, has captivated the attention of our wealthiest elites, proposing that the state itself be subject to market competition."
 propertarian_origins.1.f: ""If there is one well-established truth in political economy, it is this: That in all cases, for all commodities that serve to provide for the tangible or intangible needs of the consumer, it is in the consumer's best interest that labor and trade remain free.\n\nWhy should the production of security be an exception to this rule? To say that the market applies to all things except the administration of justice and defense is an inconsistency. Either this is logical and true, or else the principles on which economic science is based are invalid.""
 propertarian_origins.1.a: "A visionary blueprint for the modern age."
 propertarian_origins.1.b: "The state is obsolete! Let the market govern!"
 propertarian_origins.1.c: "This is a direct threat to the sovereign state."
 ir_supported_propertarian_modifier: "Supported Propertarianism"
 ir_promoted_molinari_modifier: "Promoted Molinari"
 ir_ditched_molinari_modifier: "Exiled Molinari"
 exile_minarchist_agitator_tt: "A [GetIdeology('ideology_minarchist_leader').GetName] [concept_agitator] appears in [concept_exile]"
 propertarian_leaders.tt:0 "The [SCOPE.gsInterestGroup('new_propertarian_ig').GetName] will be much more likely to select Propertarian leaders when [Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')] by an applicable [concept_political_movement]."

 propertarian_origins.2.t: "A Capital Strike"
 propertarian_origins.2.d: "[SCOPE.sCharacter('origins_propertarian_leader').GetFullName] and a consortium of our wealthiest magnates have delivered a chilling ultimatum to the government in [ROOT.GetCountry.GetCapital.GetCityHubName]. Unless executive control of [ROOT.GetCountry.GetName] is surrendered to their representatives, they will freeze all domestic investment, shutter their industries, and bring the national economy to a grinding halt."
 propertarian_origins.2.f: ""We will no longer subsidize the inefficiencies of the state with the sweat of private enterprise. You have operated at a deficit for far too long. Hand over the ledgers, or we will demonstrate exactly who truly keeps the engines of this nation running.""
 propertarian_origins.2.a: "Appoint [SCOPE.sCharacter('origins_propertarian_leader').GetHerHim] to restructure the government."
 propertarian_origins.2.b: "Let them strike. The sovereign state cannot be bought."
 propertarian_origins.2.c: "A blatant conspiracy! Seize [SCOPE.sCharacter('integrity_propertarian_leader').GetHerHis] assets and deport this [SCOPE.sCharacter('integrity_propertarian_leader').GetWomanMan]!"
 ir_propertarians_welcomed_modifier: "Propertarian Cabinet"
 ir_propertarians_rebuked_modifier: "Propertarians Rebuked"
 ir_government_restructure_modifier: "Private Restructuring"
 ir_capital_strike_modifier: "Capital Strike"

 propertarian_origins.3.t: "Market Correction"
 propertarian_origins.3.d: "The once-meteoric rise of the [GetIdeology('ideology_propertarian_movement').GetName] movement seems to have plateaued. Whilst the ideology is certain to remain in corporate think-tanks, it now faces a highly skeptical public and a political establishment unwilling to sell off its remaining power."
 propertarian_origins.3.f: "There were those among the elite who had welcomed the rise of the Propertarian movement. It could be whatever they wished it to be—a cudgel against the trade unions, a justification for monopoly, an intellectual defense of dynastic wealth. Few of them truly believed the movement's vanguard intended to literally auction off the sovereign state; it was simply a convenient philosophy to keep the tax collectors and regulators at bay.\n\nPerhaps some still longed for that millenarian promise of total deregulation and a privatized world. But the rhetoric had grown too absolute, and the public too hostile. The traditional establishment realized that without the state's courts and police, their own property rights might not survive. Those who cared about their stock prices and credibility quietly withdrew their funding, dismissing the movement as a purely academic aberration. And that was all there was to it."
 propertarian_origins.3.a: "Write the movement off as a loss."
 propertarian_origins.3.b: "The underlying fundamentals remain strong."
 ir_discredited_propertarian_modifier: "Discredited Propertarian"
 ir_fading_propertarianism_modifier: "Fading Propertarianism"

 propertarian_origins.4.t: "A Treatise on Property"
 propertarian_origins.4.d: "A widely circulated essay authored by [SCOPE.sCharacter('propertarian_leader').GetFullName], a prominent [SCOPE.sCharacter('propertarian_leader').GetIdeology.GetName], has become the primary topic of discussion in the nation's financial districts, universities, and private clubs. The unapologetic arguments for free-market absolutism are beginning to resonate deeply among the economic elite."
 propertarian_origins.4.f: ""The state, in all its bureaucratic majesty, produces absolutely nothing. It merely confiscates and redistributes the fruits of private enterprise under the threat of force. To subject the genius of industry to the whims of politicians is a crime against efficiency. When the provision of security and administration is finally submitted to the rigors of market competition, then, and only then, shall we see true prosperity.""
 propertarian_origins.4.a: "A flawless economic doctrine."
 propertarian_origins.4.b: "A dangerous disregard for sovereign authority."
 propertarian_origins.4.c: "[SCOPE.sCharacter('propertarian_leader_2').GetFullName] offers a more pragmatic approach."
 promoted_propertarian_leader_ig_modifier: "Promoted Propertarian Leader"
 promoted_propertarian_leader_modifier: "Promoted Propertarian Leader"
 ignored_propertarian_leader_ig_modifier: "Ignored Propertarian Leader"
 ignored_propertarian_leader_modifier: "Ignored Propertarian Leader"

 propertarian_origins.5.t: "Pinkerton Precedent"
 propertarian_origins.5.d: "A bitter labor dispute in [SCOPE.sState('strike_state').GetName] has brought factory production to a standstill. Before state authorities could intervene, the factory owners deployed a heavily armed private security firm to brutally clear the picket lines. They now claim that the defense of private property is a market service, not a government duty."
 propertarian_origins.5.f: ""Why should the taxpayer bear the burden of protecting our capital? The state police are bureaucratic and bound by political optics. Our contractors are efficient, directly accountable to the shareholders, and unburdened by red tape. Let the market handle security.""
 propertarian_origins.5.a: "An efficient solution. Let them work."
 propertarian_origins.5.b: "Only the state wields the truncheon. Send the police."
 propertarian_origins.5.c: "Disarm these corporate thugs immediately."
 ir_pinkertons_precedent_modifier: "Pinkerton Precedent"
 ir_pinkertons_permitted_modifier: "Pinkerton Precedent"
 ir_unresolved_strikes_modifier: "Unresolved Strikes"
 ir_monopoly_enforced_modifier: "Monopoly on Violence Enforced"

 propertarian_origins.6.t: "Propertarian in Government"
 propertarian_origins.6.d: "The sudden departure of the [SCOPE.sCharacter('new_propertarian_leader_scope').GetInterestGroup.GetName]'s old guard has left a vacuum, one filled by [SCOPE.sCharacter('new_propertarian_leader_scope').GetFullName]. As an outspoken [SCOPE.sCharacter('new_propertarian_leader_scope').GetIdeology.GetName], [SCOPE.sCharacter('new_propertarian_leader_scope').GetHerHis] appointment signals a sharp turn toward Propertarian ideals within the political establishment."
 propertarian_origins.6.f: ""[SCOPE.sCharacter('new_propertarian_leader_scope').GetLastNameNoFormatting] actually wants to privatize the administration. All of it. The tax collectors, the clerks, the lot!"\n\n"It's madness. You cannot run the government like a joint-stock company. We must pressure them to select a more moderate candidate."\n\n"Why? The bureaucracy is bleeding our taxes dry. Let [SCOPE.sCharacter('new_propertarian_leader_scope').GetHerHim] into the cabinet and see if [SCOPE.sCharacter('new_propertarian_leader_scope').GetSheHe] can actually balance the books. If [SCOPE.sCharacter('new_propertarian_leader_scope').GetSheHe] fails, we wash our hands of it.""
 propertarian_origins.6.a: "Let them test their theories in government."
 propertarian_origins.6.b: "The state is not a business. Force a leadership change."
 ir_refused_propertarian_seat_modifier: "Refused Propertarian Leadership"

 propertarian_origins.7.t: "Industry and Integrity"
 propertarian_origins.7.d: "The ideas have long existed on paper; what they lacked was a moment. Such a moment now arrives in [ROOT.GetCountry.GetNameNoFlag]. On one hand, agitators are clamouring for the seizure of private enterprise, and on the other a class of industrialists grown weary of underwriting a state indifferent to their concerns. From this convergence, the Propertarian creed threatens at last to harden into an organised political force."
 propertarian_origins.7.f: "“When the apparatus of government ceases to protect the property of its primary shareholders - the captains of industry - it must be treated like any other failing enterprise. It must be acquired, restructured, and fundamentally privatized.”"
 propertarian_origins.7.a: "Let history be the auditor."
 ir_propertarian_figurehead_modifier: "Propertarian Figurehead"

 # DEFENSE INCORPORATION
 defense_incorporation.1.t: "The Business of War"
 defense_incorporation.1.d: "With a stroke of the pen, [SCOPE.sCharacter('head_of_state1').GetFullName] has liquidated the state's monopoly on violence. All of our military infrastructure is currently being transferred to the private sector. As soldiers are pushed to sign new employment contracts, the collapse of our traditional command structure has left us dangerously vulnerable during this period of reorganization."
 defense_incorporation.1.f: ""I have bled for this nation. I have buried brothers-in-arms under our flag. And now you tell me that our sacrifices are to be auctioned off to the lowest bidder? That my men are to be commanded by accountants and stockjobbers? I will not turn my uniform into a corporate livery. Keep your contracts; you have bought yourselves an army of mercenaries, but you have sold the soul of the nation.""
 defense_incorporation.1.a: "Their patriotism does not pay the bills."

 defense_incorporation.2.t: "The Keys to the Armory"
 defense_incorporation.2.d: "A tense standoff is underway at one of our primary munitions depots in [SCOPE.sState('barracks_state').GetName]. A cadre of traditionalist officers, disgusted by the sudden privatization of the armed forces, have barricaded themselves inside the facility. They are actively refusing entry to the private security personnel sent to claim the armory, demanding that the state tear up the defense contracts."
 defense_incorporation.2.f: ""They waved their ledger at me as if it were a royal decree. I told them that the only inventory they would find in this armory is lead, and we are prepared to dispense it to them freely. I took an oath to this nation, not a board of directors. This is a sovereign arsenal, not a warehouse for profiteers!""
 defense_incorporation.2.a: "Break the barricades. The contract is absolute."
 defense_incorporation.2.b: "We must negotiate a peaceful transition."

 defense_incorporation.3.t: "Proprietary Logistics"
 defense_incorporation.3.d: "The free market has yielded unexpected dividends in the realm of military supply. Driven by fierce competition for state contracts, an up and coming defense firm has independently developed a new supply chain method. They are moving munitions and rations with a speed that puts our old state quartermasters to shame. However, they are aggressively guarding these methods as proprietary corporate secrets."
 defense_incorporation.3.f: ""INTERNAL MEMORANDUM: To all regional quartermasters. The new interlocking crate designs and rail timetables are strictly proprietary to this firm. Any employee or sub-contractor found sharing these methods with state attachés or rival agencies will be subject to immediate termination and subsequent legal action.""
 defense_incorporation.3.a: "Seize the patents."
 defense_incorporation.3.b: "The market was always the solution."
 ir_proprietary_tech_modifier: "Proprietary Technologies"
 ir_seized_patents: "Seized Patents"
 ir_new_logistics_modifier: "New Logistics Methods"

 defense_incorporation.4.t: "Collateral Damage"
 defense_incorporation.4.d: "Reports of incidental looting and violence have emerged from [SCOPE.sState('mercenary_state').GetName]. The perpetrators appear to be a group off-duty personnel from one of our primary defense contractors. Operating outside the bounds of traditional military justice, these heavily armed mercenaries are acting with total impunity. Local law enforcement is entirely unequipped - or perhaps unwilling - to rein them in."
 defense_incorporation.4.f: ""We consider the events in question to be a regrettable, yet statistically acceptable, byproduct of high-stress combat readiness. Our internal review board has docked the hazard pay of the individuals involved. As per section 4, paragraph 9 of our operational contract, local authorities have no jurisdiction over our personnel. We consider the matter closed.""
 defense_incorporation.4.a: "Send in the state police. Arrest the ringleaders."
 defense_incorporation.4.b: "Forward the civilian complaints to their Human Resources department."
 ir_state_crackdown_modifier: "Defense Agencies Crackdown"
 ir_unrestrained_defense_agencies_modifier: "Unrestrained Personnel"

 defense_incorporation.5.t: "The Business of Politics"
 defense_incorporation.5.d: "A damning exposé has revealed rampant financial corruption within the government. [SCOPE.sCharacter('corrupt_leader').GetFullName] has been caught purchasing massive shares in newly formed private military corporations mere days before those same corporations were awarded highly lucrative, exclusive state defense contracts. The public is outraged by this blatant war profiteering."
 defense_incorporation.5.f: ""I vehemently resent the implication that my financial portfolio dictates my patriotism! I simply possess an unshakable faith in the free market to provide for our national security, and I have aligned my personal investments with that belief. It is not a crime to be prescient.""
 defense_incorporation.5.a: "[SCOPE.sCharacter('corrupt_leader').GetFirstName] must surrender his position and an investigation is to be held."
 defense_incorporation.5.b: "Let [SCOPE.sCharacter('corrupt_leader').GetFirstName] have [SCOPE.sCharacter('corrupt_leader').GetHerHis] dividends."
 legitimacy_5_modifier: "Show of Resolve"
 ir_corruption_investigation_modifier:"Insider Trading Investigation"
 ir_investigating_corruption_modifier:"Investigating Corruption"
 ir_allowed_corruption_modifier:"Allowed Corruption"

 defense_incorporation.6.t: "Defense, Incorporated"
 defense_incorporation.6.d: "The military restructuring is finally complete. The last of the old guard has either retired in protest or accepted lucrative executive positions. From logistics and munitions to frontline combat, our national defense is now entirely operated by private military corporations. The traditional state army is dead; the era of the Defense Contractor has begun."
 defense_incorporation.6.f: "The transition was remarkably quiet. Where recruitment posters once appealed to patriotism and glory, sleek brochures now advertise competitive wages and hazard pay dividends. The War Office ledgers no longer track casualties and medals; they track profit margins, ammunition expenditures, and quarterly combat performance metrics. Blood is still spilled, but now, every drop is itemized."
 defense_incorporation.6.a: "The business of war is business."

 propertarian_government_remains_tt: "[SCOPE.sCharacter('new_propertarian_leader_scope').GetFullName] will be allowed to take [SCOPE.sCharacter('new_propertarian_leader_scope').GetHerHis] seat in government"
 propertarian_government_expelled_tt: "A [GetIdeology('ideology_moderate').GetName] [concept_politician] will assume leadership of the [SCOPE.sCharacter('new_propertarian_leader_scope').GetInterestGroup.GetName]"
 propertarian_becomes_agitator_tt: "[SCOPE.sCharacter('new_propertarian_leader_scope').GetFullName] will become an [concept_agitator]"
 modifier_government_refused_propertarian_seat: "Refused Propertarian Government"

 # BOARDROOM SCHISM
 boardroom_schism.1.t: "Propertarians Splinter"
 boardroom_schism.1.d: "With the total eradication of the public sector, the Propertarian vanguard has found itself in an ideological vacuum. Their unifying hatred of the state is gone, and in its place, a bitter philosophical schism has erupted over the ultimate destiny of a fully privatized society."
 boardroom_schism.1.f: ""We have slain the Leviathan, only to discover we cannot agree on what to build from its bones," an editorial in the nation's leading financial journal declares. "The Molinarists preach an absolute anarchy of the market, where every individual is a sovereign state of one. The Monopolists argue the exact opposite: that true efficiency demands the eradication of competition itself, merging the entire nation into a single, inescapable sovereign monopoly. The Directorate hangs precariously in the balance.""
 boardroom_schism.1.a: "The Directorate is the stepping stone to absolute liberty."
 boardroom_schism.1.b: "The Directorate must become the Sovereign Monopoly."
 boardroom_schism.1.c: "We cannot risk market instability on these crude ideas!"

 boardroom_schism.2.t: "Extraordinary General Meeting"
 boardroom_schism.2.d: "As the Chairman bangs the gavel, the floor is immediately hijacked by the three rival factions, each demanding a mandate."
 boardroom_schism.2.f: ""Order! Order in the Boardroom!" the Chairman's voice called out.\n\n"Order is a monopolistic construct!" yelled a Molinarist representative, flanked by his own heavily-armed contracted security.\n\n"Order is the only thing keeping your stock options from being as good as kindling!" a Minarchist executive retorted.\n\nMeanwhile, the Monopolist delegation sat in terrifying, uniform silence, simply sliding a leather-bound dossier across the central table. The message was clear: they already owned half the men in the room."
 boardroom_schism.2.a: "Consolidate the floor."
 boardroom_schism.2.b: "Enforce standing bylaws."
 boardroom_schism.2.c: "Deregulate the meeting."
 boardroom_schism.2.e: "Filibuster the session. Adjourn without a resolution."
 ir_failed_egm_modifier: "E.G.M Adjourned"
 ir_egm_appeased_modifier: "E.G.M Success"
 ir_egm_upset_modifier: "E.G.M Failure"

 boardroom_schism.3.t: "Return on Academic Investment"
 boardroom_schism.3.d: "The highly anticipated macroeconomic feasibility study has finally been delivered to the Chairman of the Board. The conclusions, however, are a highly flammable mix of conflicting praxeological theories."
 boardroom_schism.3.f: ""Sir, the institute's deliverables are... comprehensive," the Chief Academic Liaison stammers, dropping a literal crate of leather-bound manuscripts on the desk.\n\n"Chapter 4 mathematically 'proves' that absolute Molinarist anarchy maximizes quarterly dividends. Chapter 7, however, guarantees that a Sovereign Monopoly is the only shield against foreign labor markets. And the Minarchist baseline is heavily defended in the appendices." The Chairman flips to the executive summary. It is essentially just a graph showing profits going up, surrounded by thousands of pages of ideological justification. If this reaches the boardroom, it will be a bloodbath of confirmation bias."
 boardroom_schism.3.a: "Allow the Board to consider the methodology."
 boardroom_schism.3.b: "Enforce NDAs and burn the manuscripts."
 ir_offbook_liabilities_modifier: "Off-Book Liabilities"
 ir_boardroom_confidence_modifier: "Boardroom Confidence"

 boardroom_schism.4.t: "The Sovereign Buyout"
 boardroom_schism.4.d: "Following months of aggressive buyouts and backdoor dealings, the Monopolist lobby has achieved a supermajority within the Directorate. In a chillingly brief emergency session, [SCOPE.sCharacter('mandate_leader').GetFullName] invoked a controversial charter to forcibly acquire the assets of all remaining competitors."
 boardroom_schism.4.f: ""You championed the free market, did you not? You wrote endless treatises on the absolute right of capital to accumulate, to outcompete, to consume the weak.\n\nThere is no longer a need for the chaos of competition. We have reached the logical conclusion of Propertarianism. The nation is now a subsidiary of our firm, and we demand absolute efficiency. You are hereby relieved of your positions. Please surrender your shares to our security personnel on the way out.""
 boardroom_schism.4.a: "Competition is a redundant waste of capital."
 boardroom_schism.4.b: "This is a blatant violation of anti-trust contracts."

 boardroom_schism.5.t: "Dissolution of the Board"
 boardroom_schism.5.d: "The Molinarist lobby has secured an ideological stranglehold over the Directorate's shareholders. In an unprecedented emergency session, [SCOPE.sCharacter('mandate_leader').GetFullName] introduced a binding resolution to completely liquidate the Board. Across the nation, subsidiary companies are declaring independence, private defense agencies are refusing orders from the capital, and the central administrative apparatus is rapidly collapsing."
 boardroom_schism.5.f: ""For years, we claimed to be the ultimate realization of the free market, yet we hypocritically clung to a central Board of Directors that held a monopoly on arbitration and security. A state by any other name is still a state," declared [SCOPE.sCharacter('mandate_leader').GetFullName] to a gallery of stunned executives.\n\n"Today, we liquidate the ultimate monopoly. From this moment forth, every subsidiary, every defense contractor, and every individual is a sovereign entity. We no longer answer to the Board. We answer only to the contract.""
 boardroom_schism.5.a: "True liberty is found only in a polycentric market."
 boardroom_schism.5.b: "This is absolute, unmitigated anarchy!"

 boardroom_schism.6.t: "A Return to Fundamentals"
 boardroom_schism.6.d: "After months of crippling ideological volatility, the Minarchist establishment has secured a definitive victory. The latest General Meeting concluded with the sweeping expulsion of both Monopolist and Molinarist agitators from the executive committee. The Board of Directors has been restructured, stripping the radical elements of their voting shares and cementing a return to the foundational principles of corporate governance."
 boardroom_schism.6.f: ""A company without a regulator is a riot, and a company without competitors is a tomb," declared [SCOPE.sCharacter('mandate_leader').GetFullName], adjusting [SCOPE.sCharacter('mandate_leader').GetHerHis] cuffs as private security escorted the shouting radicals from the chamber.\n\n"The Directorate was not forged to be dismantled by anarchists, nor was it meant to become a bloated, monopolistic behemoth. It exists for one purpose: to protect property and enforce contracts. We are the night-watchmen of the market. Now, if you please, gentlemen... the markets have officially opened.""
 boardroom_schism.6.a: "The Markets have opened."
 boardroom_schism.6.b: "Blacklist the agitators and liquidate their portfolios."

 boardroom_schism.7.t: "The Apostate Executive"
 boardroom_schism.7.d: "[SCOPE.sCharacter('defector_executive').GetFullName], the celebrated CEO of [SCOPE.sCompany('defector_company').GetNameNoFormatting], has renounced [SCOPE.sCharacter('defector_executive').GetHerHis] former creed before a packed press auditorium. The stock ticker is already bleeding; the quarterly conference call has devolved into open accusations of grift and insider dealing. The Board must decide what to do with the traitor before the market decides for them."
 boardroom_schism.7.f: ""For too long I have parroted the received wisdom of a movement which, upon rigorous praxeological audit, cannot even balance its own moral ledger. I have sold my fellow shareholders a defective product, and I will not make that sale again."
 boardroom_schism.7.a: "Elevate our new convert. This is a prospectus-level coup."
 boardroom_schism.7.b: "Brand [SCOPE.sCharacter('defector_executive').GetHerHim] a turncoat and have [SCOPE.sCharacter('defector_executive').GetHerHim] blacklisted."
 boardroom_schism.7.c: "A martyr is more profitable than a traitor."
