 movement_propertarian_short: "Propertarian"

 ideology_propertarian_movement: "Propertarian"
 ideology_propertarian_movement_desc: "#lore This movement advocates for the supremacy of private property and free enterprise, seeking to dismantle bureaucratic overreach in favor of corporate governance.#!"
 ideology_propertarian_monopolist: "Market Consolidationist"
 ideology_propertarian_monopolist_desc: "#lore This movement advocates for consolidation of political and economic power under a Directorate, transforming the free market into a Sovereign Monopoly.#!"
 ideology_propertarian_molinarist: "Free-Market Absolutist"
 ideology_propertarian_molinarist_desc: "#lore This movement advocates for the state's monopoly on violence to be relinquished in the name of unmitigated economic and contractual freedom.#!"

 ideology_molinarist_leader: "Molinarist"
 ideology_molinarist_leader_desc: "#lore This leader holds absolute property rights as the highest moral principle, and seeks to dismantle state interference in favor of unrestricted market freedom.#!"
 ideology_minarchist_leader: "Minarchist"
 ideology_minarchists: "Minarchists"
 ideology_minarchist_leader_desc: "#lore This leader believes the government should be reduced to a night-watchman state, existing solely to enforce private contracts, protect corporate property, and suppress internal unrest.#!"
 ideology_monopolist_leader: "Monopolist"
 ideology_monopolist_leader_desc: "#lore This leader views free-market competition as chaotic and wasteful, advocating for the total consolidation of industry and state into a single, centrally-planned corporate entity.#!"

 ideology_market_rationalist: "Market Rationalist"
 ideology_market_rationalist_desc: "This group believes traditional governance is inefficient and that society must be managed through market rationality and the private administration of the Directorate."
 ideology_loyalist_2: "Loyalist"
 ideology_loyalist_2_desc: "#lore This group believes each citizen should pay their dues to fund the vital functions of the state, and that the state should provide basic public services to its veterans.#!"
 ideology_martial_corporatist: "Martial Corporatist"
 ideology_martial_corporatist_desc: "Unrestricted commerce requires uncompromising security. Absolute civil order and national defense are best achieved through the efficiency of military enterprise."

