 # LAWS
 law_ministry_of_truth:0 "Ministry of Truth"
 law_ministry_of_truth_desc:1 "The state operates a Ministry of Truth tasked with manufacturing public consent through the total embracement of propaganda theory."
 law_national_labor_service: "National Labor Service"
 law_national_labor_service_desc: "Labor is organized as a compulsory service to the state, with the government assuming total authority over wage levels and employment terms in the name of national interest."

 law_directorate: "Directorate"
 law_directorate_desc: "The distinction between state and industry is unclear, as authority stems from a board of directors representing the nation’s wealthiest CEOs. Institutions of old have been reduced to mere figurehead or abolished completely."
 law_private_administration: "Privatized Administration"
 law_private_administration_desc: "The daily administration of the state is outsourced to private enterprise or delegated to a subsidiary, reducing government bloat (as well as its efficiency) considerably."
 law_contractual_subjecthood: "Contractual Subjecthood"
 law_contractual_subjecthood_desc: "The state is a service provider, and the resident is a client. Citizenship is a voluntary, renewable contract for the provision of law, security, and infrastructure."
 EFFECTS_ON_ACCEPTANCE_law_contractual_subjecthood: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Low Acceptance status Pops face moderate penalties, but more accepted Pops receive few benefits#!#!"

 law_sovereign_monopoly: "Sovereign Monopoly"
 law_sovereign_monopoly_desc: "A centrally planned corporate economy where competitor corps have been relegated to subsidiary arms of the monopoly. The directorate owns and manages all major industries while prioritizing profit margins above all else."
 ir_sm_throughput_modifier: "Sovereign Monopoly Throughput Conversion"
 ir_sm_construction_modifier: "Sovereign Monopoly Construction Conversion"

 law_internal_arbitration: "Internal Arbitration"
 law_internal_arbitration_desc: "Labor unions are represented by human resource departments. All negotiations are conducted through internal mediation, designed to maximize industrial efficiency and prevent collective action."
 law_voluntary_association: "Voluntary Association"
 law_voluntary_association_desc: "Employment is strictly defined as an at-will, private contract between an individual and a corporation. Labor disputes are settled purely by market leverage."
 law_corporate_peonage: "Corporate Peonage"
 law_corporate_peonage_desc: "Employment is a binding, multi-generational asset of the corporation. Workers are housed in company towns, paid in company scrip, and trapped by inescapable debt, ensuring a permanent and compliant labor force."
 law_equity_compensation: "Equity Compensation"
 law_equity_compensation_desc: "In the face of imminent communist threat, the monopoly's workforce are granted fractional stock options and dividend payouts. This ongoing expense will replace class conflict with shareholder loyalty - for the time being."

 law_private_defense_agencies: "Private Defense Agencies"
 law_private_defense_agencies_desc: "National defense is outsourced to competing private military corporations, replacing patriotic duty with highly lethal employment contracts."
 ir_private_militarized_police: "Private Militarized Police"

 law_polycentric_law: "Polycentric Law"
 law_polycentric_law_desc: "The central government is dissolved in favor of a web of private contracts, with society being governed by competing networks of private courts and corporate defense contractors."
 law_oligopoly: "Oligopoly"
 law_oligopoly_desc: "The state is governed by a cartel of rival corporate syndicates. Political power is distributed among the wealthiest shareholders, who treat national policy as a series of hostile takeovers and negotiated mergers."
 law_executive_absolutism: "Executive Absolutism"
 law_executive_absolutism_desc: "Following a ruthless consolidation of the market, the office of the Chairman exerts considerable political and economic sway over the Board of Directors."
 law_managed_democracy: "Managed Democracy"
 law_managed_democracy_desc: "Elections are held on schedule, but the results are decided in the boardroom. Corporate wealth ensures that the voters are guided toward the most profitable and efficient leadership."
 law_scientific_management: "Scientific Management"
 law_scientific_management_desc: "Stripped of political sentiment, the Board of Directors operates purely on statistical targets and performance metrics, viewing every aspect of society as a variable to be measured, managed, and maximized."
  ## AMENDMENTS
 amendment_anatomy_act: "Anatomy Acts"
 amendment_anatomy_act_desc: "In response to grave-robbing practices, this provision declares that the unclaimed dead must be surrendered to university anatomists for dissection."
 amendment_agricultural_exemption: "Agricultural Exemptions"
 amendment_agricultural_exemption_desc: "While children are barred from the factories and mines, the ancient tradition of youth working the fields remains firmly untouched."
 amendment_pauper_apprenticeships: "Pauper Apprenticeships"
 amendment_pauper_apprenticeships_desc: "Factory owners may take destitute children directly from the workhouses to labor as apprentices, provided they are given rudimentary education in return."
 amendment_entrenched_entitlements: "Entrenched Entitlements"
 amendment_entrenched_entitlements_desc: "The public has come to take the state's social safety net as a basic right. Any attempt to dismantle these economic guarantees will prove institutionally challenging."
 amendment_union_infiltrators: "Union Infiltrators"
 amendment_union_infiltrators_desc: "The Secret Police Bureau manages a wing dedicated to weeding out radical left-wing ideologies."
 amendment_moral_policing: "Moral Policing"
 amendment_moral_policing_desc: "The Secret Police Bureau manages a wing dedicated to public morality, carefully monitoring the nation's cultural output to prevent subversive philosophies from infecting the populace."
 amendment_civic_literacy_acts: "Civic Literacy Acts"
 amendment_civic_literacy_acts_desc: "By mandating national politics and political theory as core subjects in public schools, the state fosters a highly vocal and politically active populace."
 amendment_comprehensive_care_provisions: "Comprehensive Care Provisions"
 amendment_comprehensive_care_provisions_desc: "Private health insurers are strictly forbidden from denying coverage to citizens suffering from prior ailments, guaranteeing care for the most vulnerable."
 amendment_independent_auditors: "Independent Auditors"
 amendment_independent_auditors_desc: "To prevent private contractors from skimming public funds, auditors are established to inspect corporate ledgers."
 amendment_anti_trust_acts: "Anti-Trust Acts"
 amendment_anti_trust_acts_desc: "To prevent corporate monopolies from crushing local competition, legal rules are established to prevent over-consolidation."
 amendment_native_homesteading: "Native Homesteading"
 amendment_native_homesteading_desc: "Agricultural land ownership is legally restricted to native citizens, protecting local farmers from foreign landlords."
 amendment_racial_science_institutes: "Racial Science Institutes"
 amendment_racial_science_institutes_desc: "State universities are heavily funded to study scientific racism and manage the genetic purity of the population."
